# Syncline Notifier - Application Configuration

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Application Info
spring.application.name=syncline-notifier
info.app.name=Syncline Notification Service
info.app.version=1.0.0
info.app.description=Handles notifications for the Syncline task management system

# Logging Configuration
logging.level.root=INFO
logging.level.com.syncline.notifier=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# CORS Configuration (for development)
# In production, configure specific origins
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Jackson JSON Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# Banner
spring.banner.location=classpath:banner.txt

# Actuator (optional - for monitoring)
# management.endpoints.web.exposure.include=health,info
# management.endpoint.health.show-details=always
