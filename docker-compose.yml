# docker-compose.yml
version: '3.8'

services:
  # Node.js API (Backend)
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: syncline-api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=/data/syncline.db
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
    volumes:
      - ./database:/data
    networks:
      - syncline-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # React Frontend
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: syncline-web
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - syncline-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Python Background Worker
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: syncline-worker
    environment:
      - DATABASE_PATH=/data/syncline.db
      - NOTIFIER_URL=http://notifier:8080
      - API_URL=http://api:3001
    volumes:
      - ./database:/data
    depends_on:
      - api
      - notifier
    networks:
      - syncline-network
    restart: unless-stopped

  # Java Notification Service
  notifier:
    build:
      context: ./notifier
      dockerfile: Dockerfile
    container_name: syncline-notifier
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=production
    networks:
      - syncline-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  syncline-network:
    driver: bridge

volumes:
  database:
    driver: local
